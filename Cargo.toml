[workspace]
resolver = "2"
members = [
    "crates/config",
    "crates/core-tools",
    "crates/database",
    "crates/http",
    "crates/llm-inference",
    "crates/logging",
    "crates/prompt-templates",
    "crates/schemas",
    "crates/server",
    "crates/task-context",
    "crates/task",
    "crates/tool-spec",
    "crates/workflows",
    "tools/generate-code",
    "tools/create-release-tag", "crates/json-schema",
]

[workspace.package]
version = "0.0.0"
edition = "2024"
license = "AGPL-3.0-only"
authors = ["Sauropod <contact@sauropod.io>"]
publish = false
repository = "https://github.com/sauropod-io/sauropod"
homepage = "https://sauropod.io"

[workspace.dependencies]
anyhow = "1.0.97"
async-trait = "0.1.88"
axum = { version = "0.8", features = ["json", "http1", "http2"] }
clap = { version = "4.5.35", features = ["env"]}
config = {version = "0.15.11", default-features = false, features = ["toml"]}
directories = "6.0.0"
jsonschema = { version = "0.29.1", default-features = false }
minijinja = { version = "2.9.0", default-features = false, features = ["loader", "serde"]}
reqwest = { version = "0.12.14", features = ["json"] }
rmcp = { version = "0.1.5", default-features = true, features = ["client", "transport-io", "transport-sse", "transport-child-process"]}
rusqlite = { version = "0.34.0", features = ["bundled", "serde_json"]}
schemars = "1.0.0-alpha.17"
serde = {version = "1.0.219", features = ["serde_derive"]}
serde_json = "1.0.140"
thiserror = "2.0.12"
tokio = { version = "1.44", features = ["full"] }
toml = "0.8.20"
tower = "0.5.2"
tower-http = { version = "0.6.2", features = ["cors"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }

[profile.optimized-release]
inherits = "release"
lto = "fat"
opt-level = 3
panic = "abort"
