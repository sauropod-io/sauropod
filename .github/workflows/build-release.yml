name: Build Release

on:
  # Generate release artifacts when any tag is pushed
  push:
    tags:
      - "v*"

env:
  # We don't need incremental compilation in CI
  CARGO_INCREMENTAL: "0"

jobs:
  build-release-binaries:
    strategy:
      matrix:
        target:
          - arch: x86_64
            os: linux
            image: ubuntu-latest
          - arch: aarch64
            os: macos
            image: macos-latest
          - arch: aarch64
            os: linux
            image: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
      attestations: write
    runs-on: ${{ matrix.target.image }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up
        uses: ./.github/actions/set-up

      - name: Build the release
        run: |
          make release
          mv target/optimized-release/sauropod-server sauropod-${{ matrix.target.arch }}-${{ matrix.target.os }}
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          SOURCE_DATE_EPOCH: 0

      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: sauropod-${{ matrix.target.arch }}-${{ matrix.target.os }}
          path: |
            sauropod-${{ matrix.target.arch }}-${{ matrix.target.os }}
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: sauropod-${{ matrix.target.arch }}-${{ matrix.target.os }}
          subject-digest: sha256:${{ steps.upload.outputs.artifact-digest }}

  build-container:
    strategy:
      matrix:
        target:
          - arch: x86_64
            os: linux
            image: ubuntu-latest
          - arch: aarch64
            os: linux
            image: ubuntu-24.04-arm
    runs-on: ${{ matrix.target.image }}
    timeout-minutes: 15
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Get Docker tag
        id: docker_tag
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            if (tag.startsWith('v')) {
              return tag.slice(1);
            } else {
              return tag;
            }
      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.docker_tag.outputs.result }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          SOURCE_DATE_EPOCH: 0
      - name: Attest
        uses: actions/attest-build-provenance@v2
        id: attest
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  create-release:
    runs-on: ubuntu-latest
    needs: [build-release-binaries, build-container]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: sauropod-*
          merge-multiple: true

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: binaries/*
          draft: true
