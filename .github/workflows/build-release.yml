name: Build Release

on:
  # Generate release artifacts when any tag is pushed
  push:
    tags:
      - "*"

env:
  # We don't need incremental compilation in CI
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    strategy:
      matrix:
        target:
          - arch: x86_64
            os: linux
            image: ubuntu-latest
          - arch: aarch64
            os: macos
            image: macos-latest
          # ubuntu-24.04-arm is not available for private repos - 😟
          # - arch: aarch64
          #   os: linux
          #   image: ubuntu-24.04-arm
    runs-on: ${{ matrix.target.image }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up
        uses: ./.github/actions/set-up

      - name: Build the release
        run: |
          make release
          mv target/optimized-release/sauropod-server sauropod-${{ matrix.target.arch }}-${{ matrix.target.os }}
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sauropod-${{ matrix.target.arch }}-${{ matrix.target.os }}
          path: |
            sauropod-${{ matrix.target.arch }}-${{ matrix.target.os }}

  create-release:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: sauropod-*
          merge-multiple: true

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: binaries/*
          draft: true
